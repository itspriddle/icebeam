version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "11:00"
      timezone: "America/New_York"
    groups:
      go-modules:
        patterns:
          - "*"
    cooldown:
      default-days: 10
      semver-major-days: 7
      semver-minor-days: 3
      semver-patch-days: 2
    commit-message:
      prefix: "Deps"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "11:00"
      timezone: "America/New_York"
    groups:
      github-actions:
        patterns:
          - "*"
    cooldown:
      default-days: 7
    commit-message:
      prefix: "Deps"
